<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1 class="header">Hello, Protocol</h1>
    <button onclick="fetchData()">백엔드 통신 경험하기</button>
    <button onclick="errorHandling()">백엔드 에러 경험하기</button>
    <!-- script -->
    <script>
      const headerEl = document.querySelector(".header");
      const fetchData = function () {
        fetch("http://localhost:4000/request")
          .then(function (res) {
            return res.json();
          })
          .then((data) => {
            console.log(data);
            headerEl.innerHTML = data;
          })
          .catch((err) => {
            console.error(err);
          });
      };

      async function errorHandling() {
        try {
          const res = await fetch("http://localhost:4000/error");
          const data = await res.json();
          console.log(data);
          headerEl.innerHTML = data;
        } catch (err) {
          console.error(err);
        }
      }
    </script>
  </body>
</html>
