<!doctype html>
<html lang="en">
  <head>
    <title>Document</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
      .bg-orange {
        background-color: orange;
      }
      .bg-skyblue {
        background-color: skyblue;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <h1 :class="myStyle">배경은? {{ msg }}</h1>
      <label for="checkbox">오랜지색?</label>
      <input type="checkbox" id="checkbox" v-model="isOrange" />
    </div>
    <script>
      Vue.createApp({
        name: 'App',
        data() {
          return {
            isOrange: false,
          };
        },
        computed: {
          myStyle() {
            return this.isOrange ? 'bg-orange' : 'bg-skyblue';
          },
          msg() {
            return this.isOrange ? '오렌지' : '하늘색';
          },
        },
      }).mount('#app');
    </script>
  </body>
</html>
