<!doctype html>
<html lang="en">
  <head>
    <title>Document</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      <input v-bind:type="firstInputType" />
      <input v-bind:type="secondInputType" />
      <button v-on:click="changeInputType">인풋 타입 일괄 변경 버튼</button>
    </div>
    <script>
      Vue.createApp({
        name: 'App',
        data() {
          return {
            firstInputType: 'checkbox',
            secondInputType: 'radio',
          };
        },
        methods: {
          changeInputType() {
            this.firstInputType = 'radio';
            this.secondInputType = 'input';
          },
        },
      }).mount('#app');
    </script>
  </body>
</html>
