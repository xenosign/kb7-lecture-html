<!doctype html>
<html lang="en">
  <head>
    <title>Document</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      <img v-bind:src="imgSrc" />
      <button v-on:click="changeImgSrc">이미지 변경</button>
    </div>
    <script>
      Vue.createApp({
        name: 'App',
        data() {
          return {
            imgSrc:
              'https://photo.coolenjoy.co.kr/data/editor/2008/20200813130955_aiqgbsrk.gif',
          };
        },
        methods: {
          changeImgSrc() {
            this.imgSrc =
              'https://gulgang.com/web/product/big/202512/348834b257bdc4ba081e8900bb7c7673.jpg';
          },
        },
      }).mount('#app');
    </script>
  </body>
</html>
