<!doctype html>
<html lang="en">
  <head>
    <title>Document</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      <h1>{{ msg }}</h1>
      <input type="text" v-model.number="inputNum" />
      <button v-on:click="checkAnswer">확인</button>
    </div>
    <script>
      Vue.createApp({
        name: 'App',
        data() {
          return {
            random: parseInt(Math.random() * 20),
            inputNum: 0,
            msg: '랜덤으로 생성 된 숫자(1 ~ 20)를 맞춰보세요!',
          };
        },
        methods: {
          checkAnswer() {
            if (this.random > this.inputNum) this.msg = 'UP';
            else if (this.random < this.inputNum) this.msg = 'DOWN';
            else this.msg = '정답!!';
          },
        },
      }).mount('#app');
    </script>
  </body>
</html>
