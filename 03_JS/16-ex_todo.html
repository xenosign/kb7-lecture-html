<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .done {
        text-decoration: line-through;
      }
    </style>
  </head>
  <body>
    <ul>
      <li>오늘 할 일</li>
    </ul>
    <input id="input" />
    <button>할 일 추가</button>
    <script>
      const list = document.querySelector("ul");
      const input = document.querySelector("#input");
      const addBtn = document.querySelector("button");

      addBtn.addEventListener("click", function () {
        const newTodo = document.createElement("li");

        // newTodo 의 textContent 가 delBtn 추가 이후에 동작하면 li 태그 내부의 button 태그를 전부
        // input 에서 입력받은 텍스트로 변경하기 때문에, 먼저 textContent 부터 작업 필요
        newTodo.textContent = input.value;

        newTodo.addEventListener("click", function () {
          newTodo.classList.toggle("done");

          // if (!newTodo.classList.contains("done")) {
          //   newTodo.classList.add("done");
          // } else {
          //   newTodo.classList.remove("done");
          // }
        });

        input.value = "";

        const delBtn = document.createElement("button");
        delBtn.textContent = "삭제 버튼";
        delBtn.addEventListener("click", function (e) {
          e.stopPropagation();
          e.target.parentNode.remove();
        });
        newTodo.append(delBtn);

        list.append(newTodo);
      });
    </script>
  </body>
</html>
