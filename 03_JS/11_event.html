<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      window.onload = function () {
        const test = () => {
          alert("test");
        };

        const listenerEl = document.querySelector("#listener");
        listenerEl.addEventListener("click", test);
      };
    </script>
  </head>
  <body>
    <div id="onclick" onclick="test()">onclick</div>
    <div id="listener">listener</div>
    <script></script>
  </body>
</html>
