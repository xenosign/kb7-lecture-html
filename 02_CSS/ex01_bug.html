<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      div {
        width: 100px;
        height: 100px;
        position: absolute;
        border-radius: 50%;
        border: 1px solid black;
      }

      .head {
        position: relative;
        background-color: skyblue;
      }

      .eye {
        position: absolute;
        left: 20%;
        top: 20%;
        width: 30px;
        height: 30px;
        background-color: white;
      }

      .eye::after {
        content: "";
        display: block;
        position: absolute;
        background-color: black;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        left: 5px;
        top: 5px;
      }

      .body1 {
        background-color: burlywood;
        left: 50px;
        top: 50px;
      }

      .body2 {
        background-color: dodgerblue;
        left: 100px;
        top: 75px;
      }

      .body3 {
        background-color: skyblue;
        left: 150px;
        top: 75px;
      }

      .body4 {
        background-color: blue;
        left: 200px;
        top: 75px;
      }
    </style>
  </head>
  <body>
    <div class="head">
      <div class="eye"></div>
    </div>
    <div class="body1"></div>
    <div class="body2"></div>
    <div class="body3"></div>
    <div class="body4"></div>
  </body>
</html>
